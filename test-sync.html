<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ECOS Timer Sync</title>

  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background: #fafafa;
    }

    #phase {
      font-size: 32px;
      font-weight: bold;
    }

    #timer {
      font-size: 80px;
      font-weight: bold;
      margin: 20px;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #startBtn { background: #2ecc71; color: white; }
    #resetBtn { background: #e74c3c; color: white; }
  </style>
</head>

<body>

<h1>ECOS Sync</h1>

<div id="phase">Prêt</div>
<div id="timer">00:00</div>

<button onclick="startGlobal()">START</button>
<button onclick="resetGlobal()">RESET</button>

<script>
const ably = new Ably.Realtime("TA_API_KEY_ICI");
const channel = ably.channels.get("ecos-timer");

// 🧠 ECOS 8/2
const sequence = [
  { label: "Sujet", duration: 8 * 60 },
  { label: "Pause", duration: 2 * 60 },
  { label: "Sujet", duration: 8 * 60 },
  { label: "Pause", duration: 2 * 60 },
  { label: "Sujet", duration: 8 * 60 },
  { label: "Pause", duration: 2 * 60 },
  { label: "Sujet", duration: 8 * 60 },
  { label: "Pause", duration: 2 * 60 },
  { label: "Sujet", duration: 8 * 60 }
];

let startTime = null;
let currentPhase = -1;
let oneMinBeeped = -1;

let audioCtx = null;

function beep(freq = 1000, duration = 0.25) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// 🚀 START
function startGlobal() {
  channel.publish("state", { startTime: Date.now() });
}

// 🔁 RESET
function resetGlobal() {
  channel.publish("reset", {});
}

// 📡 STATE
channel.subscribe("state", (msg) => {
  startTime = msg.data.startTime;
  currentPhase = -1;
  oneMinBeeped = -1;
});

// 📡 RESET
channel.subscribe("reset", () => {
  startTime = null;
  document.getElementById("phase").innerText = "Prêt";
  document.getElementById("timer").innerText = "00:00";
});

// ⏱️ LOOP
function update() {
  if (!startTime) return;

  let elapsed = (Date.now() - startTime) / 1000;
  let total = 0;

  for (let i = 0; i < sequence.length; i++) {
    let phase = sequence[i];
    total += phase.duration;

    if (elapsed < total) {

      let remaining = total - elapsed;

      let min = Math.floor(remaining / 60);
      let sec = Math.floor(remaining % 60);

      document.getElementById("phase").innerText =
        phase.label + " " + (Math.floor(i / 2) + 1);

      document.getElementById("timer").innerText =
        String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');

      // 🔔 fin de phase (UNE SEULE FOIS)
      if (i !== currentPhase) {
        if (currentPhase !== -1) beep(1200, 0.3);
        currentPhase = i;
        oneMinBeeped = -1;
      }

      // 🔊 bip 1 min sujet
      if (phase.label === "Sujet") {
        let elapsedInPhase = phase.duration - remaining;

        if (elapsedInPhase >= 60 && oneMinBeeped !== i) {
          beep(900, 0.25);
          oneMinBeeped = i;
        }
      }

      return;
    }
  }

  document.getElementById("phase").innerText = "FIN";
  beep(1500, 0.5);
}

setInterval(update, 500);
</script>

</body>
</html>
