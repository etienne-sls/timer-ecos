<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Timer ECOS TEST RAPIDE</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background: #fafafa;
    }

    #phase {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #timer {
      font-size: 80px;
      margin: 20px;
      font-weight: bold;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #startBtn { background: #2ecc71; color: white; }
    #pauseBtn { background: #bdc3c7; }
    #resetBtn { background: #e74c3c; color: white; }
  </style>
</head>
<body>

<h1>Timer ECOS TEST</h1>

<div id="phase">Prêt</div>
<div id="timer">00:00</div>

<button id="startBtn" onclick="start()">Start</button>
<button id="pauseBtn" onclick="pause()">Pause</button>
<button id="resetBtn" onclick="reset()">Reset</button>

<script>
let audioCtx = null;

function beep(freq = 1000, duration = 0.2) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// 🧪 TEST RAPIDE
const sequence = [
  { label: "Sujet", duration: 20 },
  { label: "Pause", duration: 5 },
  { label: "Sujet", duration: 20 },
  { label: "Pause", duration: 5 },
  { label: "Sujet", duration: 20 },
  { label: "Pause", duration: 5 },
  { label: "Sujet", duration: 20 },
  { label: "Pause", duration: 5 },
  { label: "Sujet", duration: 20 }
];

let startTime = null;
let paused = false;
let pauseOffset = 0;
let pauseStart = null;

let lastPhase = -1;
let lastMidBeep = -1;

function start() {
  if (!startTime) startTime = Date.now();
  else if (paused) {
    pauseOffset += Date.now() - pauseStart;
    paused = false;
  }

  audioCtx?.resume();
}

function pause() {
  if (!paused) {
    paused = true;
    pauseStart = Date.now();
  } else {
    paused = false;
    pauseOffset += Date.now() - pauseStart;
  }
}

function reset() {
  startTime = null;
  paused = false;
  pauseOffset = 0;
  lastPhase = -1;
  lastMidBeep = -1;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("phase").innerText = "Prêt";
}

function update() {
  if (!startTime || paused) return;

  let elapsed = (Date.now() - startTime - pauseOffset) / 1000;
  let total = 0;

  let phaseIndex = -1;

  for (let i = 0; i < sequence.length; i++) {
    total += sequence[i].duration;

    if (elapsed < total) {
      phaseIndex = i;

      let remaining = total - elapsed;

      let min = Math.floor(remaining / 60);
      let sec = Math.floor(remaining % 60);

      // 🔢 calcul correct des numéros
      let subjectNum = 0;
      let pauseNum = 0;

      for (let j = 0; j <= i; j++) {
        if (sequence[j].label === "Sujet") subjectNum++;
        else pauseNum++;
      }

      let label = sequence[i].label === "Sujet"
        ? "Sujet " + subjectNum
        : "Pause " + pauseNum;

      document.getElementById("phase").innerText = label;

      document.getElementById("timer").innerText =
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');

      // 🔊 bip fin de phase
      if (i !== lastPhase) {
        if (lastPhase !== -1) beep(1200, 0.25);
        lastPhase = i;
        lastMidBeep = -1;
      }

      // 🔔 bip à 10s dans les sujets
      if (sequence[i].label === "Sujet") {
        let elapsedInPhase = sequence[i].duration - remaining;

        if (elapsedInPhase >= 10 && lastMidBeep !== i) {
          beep(800, 0.2);
          lastMidBeep = i;
        }
      }

      return;
    }
  }

  document.getElementById("phase").innerText = "FIN";
  document.getElementById("timer").innerText = "00:00";
  beep(1500, 0.5);
}

setInterval(update, 500);
</script>

</body>
</html>
